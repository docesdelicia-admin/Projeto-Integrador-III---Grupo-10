@if (aberto) {
<div class="modal-overlay" role="presentation">
  <div class="modal-senha" role="dialog" aria-modal="true" aria-labelledby="confirmacaoSenhaTitulo">
    <h3 id="confirmacaoSenhaTitulo">{{ titulo }}</h3>
    <p>{{ mensagem }}</p>

    <form [formGroup]="formSenha" (ngSubmit)="enviarConfirmacao()">
      <label for="senhaAtualModal">{{ rotuloSenha }}</label>
      <div class="campo-senha">
        <input id="senhaAtualModal" [type]="mostrarSenha ? 'text' : 'password'" formControlName="senhaAtual"
          autocomplete="current-password" [placeholder]="placeholderSenha" />
        <button type="button" class="botao-olho" (click)="alternarVisualizacaoSenha()"
          [attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'" [attr.aria-pressed]="mostrarSenha">
          @if (mostrarSenha) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
            <path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c5.3 0 9.1 3.6 10 7-0.4 1.5-1.4 3.2-2.9 4.6" />
            <path d="M6.2 6.3C4.1 7.7 2.7 9.9 2 12c0.9 3.4 4.7 7 10 7 1.9 0 3.6-0.4 5-1.2" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12c0.9-3.4 4.7-7 10-7s9.1 3.6 10 7c-0.9 3.4-4.7 7-10 7s-9.1-3.6-10-7z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>

      <div class="modal-acoes">
        <button type="button" class="botao-secundario" (click)="fechar()" [disabled]="salvando">
          {{ textoCancelar }}
        </button>
        <button type="submit" class="botao-principal" [disabled]="formSenha.invalid || salvando">
          @if (salvando) {
          Salvando...
          } @else {
          {{ textoConfirmar }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
}
